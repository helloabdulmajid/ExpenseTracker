spring.application.name=ExpenseTracker
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/expense_tracker2}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

spring.jpa.properties.jakarta.persistence.validation.mode=AUTO

jwt.secret=${JWT_SECRET:mySuperSecretKeyForJwtAuthentication123456}
jwt.expiration=${JWT_EXPIRATION:86400000}
